<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient matching web theme -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#150f24"/>
    </linearGradient>
    <!-- Purple glow gradient -->
    <linearGradient id="pgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Card bg gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#1a1626"/>
    </linearGradient>
    <!-- Neural glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines overlay (subtle terminal aesthetic) -->
  <line x1="0" y1="58" x2="1200" y2="58" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#c084fc" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="0" x2="60" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="1140" y1="0" x2="1140" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Terminal window chrome bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#1c2030" opacity="0.9"/>
  <circle cx="26" cy="26" r="7" fill="#ff5f56"/>
  <circle cx="50" cy="26" r="7" fill="#febc2e"/>
  <circle cx="74" cy="26" r="7" fill="#28c840"/>
  <!-- Window title -->
  <text x="600" y="32" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="13" fill="#6b7280">santiago@sfseoane.es ~ portfolio 2026</text>
  <!-- Prompt icon -->
  <text x="1150" y="32" text-anchor="middle" font-family="monospace" font-size="13" fill="#c084fc" opacity="0.7">●</text>

  <!-- LEFT COLUMN — Name + Role -->

  <!-- Blinking cursor before name (decorative) -->
  <rect x="60" y="100" width="4" height="72" rx="2" fill="#c084fc" opacity="0.8"/>

  <!-- Name -->
  <text x="80" y="155" font-family="monospace, 'Courier New'" font-size="74" font-weight="bold" letter-spacing="-2" fill="#eff2f8">SFSEOANE</text>
  <text x="80" y="200" font-family="monospace, 'Courier New'" font-size="26" fill="#c084fc" letter-spacing="6">.ES</text>

  <!-- Role line -->
  <text x="80" y="248" font-family="monospace, 'Courier New'" font-size="22" fill="#9fa3ac">Data &amp; AI Engineer  ·  Python  ·  React  ·  RAG</text>

  <!-- Year badge -->
  <rect x="80" y="268" width="76" height="26" rx="13" fill="#c084fc" fill-opacity="0.15" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="118" y="286" text-anchor="middle" font-family="monospace" font-size="12" fill="#c084fc">2026</text>

  <!-- Employment badge -->
  <rect x="172" y="268" width="166" height="26" rx="13" fill="#034d3f" stroke="#10b981" stroke-width="1"/>
  <circle cx="191" cy="281" r="4" fill="#10b981"/>
  <text x="204" y="286" font-family="monospace" font-size="12" fill="#34d399">Employed @ Qaleon</text>

  <!-- RIGHT SIDE — Neural network decoration -->
  <circle cx="1040" cy="120" r="10" fill="#c084fc" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1110" cy="160" r="7"  fill="#c084fc" opacity="0.35"/>
  <circle cx="1070" cy="220" r="8"  fill="#7c3aed" opacity="0.5"/>
  <circle cx="1130" cy="95"  r="5"  fill="#c084fc" opacity="0.25"/>
  <circle cx="990"  cy="180" r="6"  fill="#7c3aed" opacity="0.4"/>
  <line x1="1040" y1="120" x2="1110" y2="160" stroke="#c084fc" stroke-width="1.5" opacity="0.25"/>
  <line x1="1040" y1="120" x2="1070" y2="220" stroke="#c084fc" stroke-width="1.5" opacity="0.25"/>
  <line x1="1110" y1="160" x2="1070" y2="220" stroke="#c084fc" stroke-width="1.5" opacity="0.25"/>
  <line x1="1040" y1="120" x2="990"  y2="180" stroke="#7c3aed" stroke-width="1"   opacity="0.2"/>
  <line x1="1130" y1="95"  x2="1110" y2="160" stroke="#c084fc" stroke-width="1"   opacity="0.2"/>
  <line x1="990"  y1="180" x2="1070" y2="220" stroke="#7c3aed" stroke-width="1"   opacity="0.2"/>

  <!-- STATS ROW -->

