  <rect x="60" y="315" width="240" height="108" rx="10" fill="url(#cardBg)" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="88" y="358" font-family="monospace" font-size="44" font-weight="bold" fill="#c084fc">5m</text>
  <text x="88" y="382" font-family="monospace" font-size="13" fill="#9fa3ac">@ Qaleon</text>
  <text x="88" y="400" font-family="monospace" font-size="11" fill="#c084fc" opacity="0.5">Oct 2025 →</text>

  <!-- Stat 2: 5+ Projects -->
  <rect x="320" y="315" width="240" height="108" rx="10" fill="url(#cardBg)" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="348" y="358" font-family="monospace" font-size="44" font-weight="bold" fill="#c084fc">5+</text>
  <text x="348" y="382" font-family="monospace" font-size="13" fill="#9fa3ac">Production Projects</text>
  <text x="348" y="400" font-family="monospace" font-size="11" fill="#c084fc" opacity="0.5">RAG · CV · ETL</text>

  <!-- Stat 3: +1M Records -->
  <rect x="580" y="315" width="240" height="108" rx="10" fill="url(#cardBg)" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="608" y="358" font-family="monospace" font-size="44" font-weight="bold" fill="#c084fc">+1M</text>
  <text x="608" y="382" font-family="monospace" font-size="13" fill="#9fa3ac">Records/Month</text>
  <text x="608" y="400" font-family="monospace" font-size="11" fill="#c084fc" opacity="0.5">Airflow Pipelines</text>

  <!-- Stat 4: AI in Production -->
  <rect x="840" y="315" width="300" height="108" rx="10" fill="#0a2e20" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="868" y="358" font-family="monospace" font-size="32" font-weight="bold" fill="#10b981">AI Production</text>
  <text x="868" y="382" font-family="monospace" font-size="13" fill="#6ee7b7">LLMs · Vision · NLP</text>
  <text x="868" y="400" font-family="monospace" font-size="11" fill="#10b981" opacity="0.6">FastAPI · LangChain · PyTorch</text>

